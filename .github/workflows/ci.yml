name: CI

on:
  push:
    branches: [main, stage]
  pull_request:
    branches: [main, stage]

# Cancel superseded runs for the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # Deterministic quality gate — no LLM agents, no secrets required.
  ci:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test:coverage

      - name: Build
        run: npm run build

  # Deploy the built site to a per-PR Firebase Hosting preview channel.
  # Skipped for fork PRs: forks don't receive repo secrets, so the deploy
  # credential would be empty and fail. Same-repo PRs only.
  # Rebuilds independently of `ci` (a ~200ms astro build) to keep jobs
  # isolated; not worth wiring up dist artifact passing for a static site.
  preview:
    name: PR preview deploy
    needs: ci
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # continue-on-error on the deploy step (not the whole job) so a failed
      # preview deploy leaves the job — and thus the "PR preview deploy" check —
      # green, without masking a genuine build regression (the Build step above
      # has no such tolerance and still fails the job). Preview is a
      # non-required, best-effort convenience; the required gate is `ci`/
      # "Checks". This stops an infra hiccup like a channel-quota 429 (#96) from
      # reading as a broken PR. The real result stays visible in this step's log
      # and the action's own "Deploy Preview" check. (Option 4 from #96.)
      - name: Deploy preview channel
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGE }}
          projectId: solar-time-stage
          # Short TTL is the backstop: idle channels self-reclaim in 2 days so
          # the per-site quota can't fill up even if a close-cleanup is missed.
          # Durable reclaim is preview-cleanup.yml (delete on PR close). See #96.
          expires: 2d
